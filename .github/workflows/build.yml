name: Manual Build Turner

# 允许在 GitHub 网页上手动点击触发
on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        # 一口气定义好你想生成的平台系统和架构
        goos: [linux, windows, osx]
        goarch: [amd64, arm64]
        exclude:
          - goos: osx
            goarch: arm64 # 排除不支持的旧版组合
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build Binary
        run: |
          # 1. 强制整理依赖，自动生成正确的 go.sum 校验文件
          go mod tidy
          # 针对不同系统做一点小兼容（Windows 加 .exe 后缀，macOS 内部叫 darwin）
          GOOS_TARGET=${{ matrix.goos }}
          [ "$GOOS_TARGET" = "osx" ] && GOOS_TARGET="darwin"
          
          EXTENSION=""
          [ "$GOOS_TARGET" = "windows" ] && EXTENSION=".exe"
          
          # 执行编译
          GOOS=$GOOS_TARGET GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
          go build -ldflags="-s -w" -o turner-${{ matrix.goos }}-${{ matrix.goarch }}${EXTENSION}
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: turner-${{ matrix.goos }}-${{ matrix.goarch }}
          path: turner-${{ matrix.goos }}-${{ matrix.goarch }}*
